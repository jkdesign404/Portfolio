<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jack Kelly</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400&display=swap" rel="stylesheet">
<style>
  @font-face {
    font-family: 'Glacier';
    src: url('Glacier-Regular.ttf') format('truetype');
    font-weight: normal;
    font-style: normal;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #EBEBEB;
    width: 100vw;
    height: 100vh;
    overflow: hidden;
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    grid-template-rows: 1fr 1fr 1fr;
    position: relative;
  }

  .triangle-widget {
    position: absolute;
    transform: translate(-50%, -50%);
    cursor: grab;
    user-select: none;
    touch-action: none;
  }

.starburst {
    grid-column: 2;
    grid-row: 2;
    place-self: center;
    cursor: grab;
    user-select: none;
    touch-action: none;
    z-index: 1;
  }

  .starburst.dragging { cursor: grabbing; }

  @keyframes spin {
    from { transform: rotate(0deg); }
    to   { transform: rotate(360deg); }
  }

  .starburst-shape {
    transform-box: fill-box;
    transform-origin: center;
    animation: spin 24s linear infinite;
  }

  .image-frame {
    grid-column: 1;
    grid-row: 2;
    place-self: center;
    transform: translateY(-120px);
    width: 200px;
    height: 260px;
    border: 6px solid #fff;
    background: #d0d0d0;
    overflow: hidden;
  }

  .image-frame img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  .image-frame-right {
    grid-column: 3;
    grid-row: 2;
    place-self: center;
    transform: translateY(120px);
    width: 200px;
    height: 260px;
    border: 6px solid #fff;
    background: #d0d0d0;
    overflow: hidden;
  }

  .image-frame-right img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

</style>
</head>
<body>

<div class="image-frame">

<svg class="starburst" width="69" height="82" viewBox="0 0 124 140" xmlns="http://www.w3.org/2000/svg" style="fill-rule:evenodd;clip-rule:evenodd;stroke-linecap:round;stroke-linejoin:round;stroke-miterlimit:1.5;">
  <path class="starburst-shape" d="M73.714,1.25l23.883,17.352l-11.942,16.436l19.322,6.278l-9.123,28.076l-19.322,-6.278l0,20.316l-29.521,0l0,-20.316l-19.322,6.278l-9.123,-28.076l19.322,-6.278l-11.942,-16.436l23.883,-17.352l11.942,16.436l11.942,-16.436Z" style="fill:#00f;stroke:#000;stroke-width:2.5px;"/>
  <text x="26.207px" y="139.522px" style="font-family:'Glacier-Regular', 'Glacier';font-size:24.62px;fill:#3a4671;">b. 2004</text>
  <text x="-1.577px" y="114.35px" style="font-family:'Inter-Light', 'Inter';font-weight:300;font-size:26.92px;">Jack K<tspan x="81.668px" y="114.35px">e</tspan>lly</text>

<svg class="triangle-widget" id="node-branding" width="46" height="63" viewBox="0 0 124 160" xmlns="http://www.w3.org/2000/svg" style="top:calc(50vh - 160px);left:calc(50vw - 60px);fill-rule:evenodd;clip-rule:evenodd;stroke-linecap:round;stroke-linejoin:round;stroke-miterlimit:1.5;">

<svg class="triangle-widget" id="node-print" width="46" height="63" viewBox="0 0 124 160" xmlns="http://www.w3.org/2000/svg" style="top:calc(50vh + 130px);left:calc(50vw - 110px);fill-rule:evenodd;clip-rule:evenodd;stroke-linecap:round;stroke-linejoin:round;stroke-miterlimit:1.5;">

  <img src="" alt="Portfolio image">

  <circle cx="62" cy="47" r="42" style="fill:none;stroke:#ff5f1f;stroke-width:2.5px;"/>

<svg class="triangle-widget" id="node-about" width="46" height="63" viewBox="0 0 124 160" xmlns="http://www.w3.org/2000/svg" style="top:calc(50vh + 130px);left:calc(50vw + 40px);fill-rule:evenodd;clip-rule:evenodd;stroke-linecap:round;stroke-linejoin:round;stroke-miterlimit:1.5;">
  <circle cx="62" cy="47" r="42" style="fill:none;stroke:#ff5f1f;stroke-width:2.5px;"/>
  <text x="62" y="124" text-anchor="middle" style="font-family:'Inter', sans-serif;font-weight:300;font-size:32px;fill:#000;">About</text>
</svg>

<script>
// ── Intro: frames grow from 0 at center and expand outward ──
const frameLeft  = document.querySelector('.image-frame');
const frameRight = document.querySelector('.image-frame-right');
const ease = 'cubic-bezier(0.4, 0, 0.2, 1)';

frameLeft.style.transition  = 'none';
frameRight.style.transition = 'none';
frameLeft.style.opacity  = '0';
frameRight.style.opacity = '0';
frameLeft.style.width    = '0';
frameRight.style.width   = '0';
frameLeft.style.height   = '0';
frameRight.style.height  = '0';
frameLeft.style.transform  = 'translate(33.33vw, 120px)';
frameRight.style.transform = 'translate(-33.33vw, -120px)';

setTimeout(() => {
  requestAnimationFrame(() => requestAnimationFrame(() => {
    frameLeft.style.transition  = `transform 1.4s ${ease}, width 1.2s ${ease}, height 1.2s ${ease}, opacity 1s ease`;
    frameRight.style.transition = `transform 1.4s ${ease}, width 1.2s ${ease}, height 1.2s ${ease}, opacity 1s ease`;
    frameLeft.style.opacity  = '1';
    frameRight.style.opacity = '1';
    frameLeft.style.width    = '200px';
    frameRight.style.width   = '200px';
    frameLeft.style.height   = '260px';
    frameRight.style.height  = '260px';
    frameLeft.style.transform  = 'translateY(-120px)';
    frameRight.style.transform = 'translateY(120px)';
  }));
}, 400);

// ── Starburst rubber band drag ──
const starburst = document.querySelector('.starburst');
let dragging = false;
let originX = 0, originY = 0;
let curX = 0, curY = 0;

starburst.addEventListener('pointerdown', e => {
  dragging = true;
  originX = e.clientX - curX;
  originY = e.clientY - curY;
  starburst.style.transition = 'none';
  starburst.classList.add('dragging');
  starburst.setPointerCapture(e.pointerId);
});

starburst.addEventListener('pointermove', e => {
  if (!dragging) return;
  curX = e.clientX - originX;
  curY = e.clientY - originY;
  starburst.style.transform = `translate(${curX}px, ${curY}px)`;
});

function release() {
  if (!dragging) return;
  dragging = false;
  curX = 0;
  curY = 0;
  starburst.classList.remove('dragging');
  starburst.style.transition = 'transform 0.7s cubic-bezier(0.34, 1.56, 0.64, 1)';
  starburst.style.transform  = 'translate(0, 0)';
}

starburst.addEventListener('pointerup', release);
starburst.addEventListener('pointercancel', release);

// ── Triangle node float + drag ──
let mouseX = -9999, mouseY = -9999;
document.addEventListener('pointermove', e => { mouseX = e.clientX; mouseY = e.clientY; });

function randVel() { return (Math.random() * 0.04 - 0.02); }

const floatNodes = [...document.querySelectorAll('.triangle-widget')].map(node => {
  // Resolve initial calc() position to concrete pixels
  const rect = node.getBoundingClientRect();
  const x = rect.left + rect.width  / 2;
  const y = rect.top  + rect.height / 2;
  node.style.left = x + 'px';
  node.style.top  = y + 'px';

  const state = { node, x, y, vx: randVel(), vy: randVel(), dragging: false,
                  pOriginX: 0, pOriginY: 0, nOriginX: 0, nOriginY: 0 };

  node.addEventListener('pointerdown', e => {
    state.dragging = true;
    state.nOriginX = state.x;
    state.nOriginY = state.y;
    state.pOriginX = e.clientX;
    state.pOriginY = e.clientY;
    node.style.cursor = 'grabbing';
    node.setPointerCapture(e.pointerId);
  });

  node.addEventListener('pointermove', e => {
    if (!state.dragging) return;
    state.x = state.nOriginX + e.clientX - state.pOriginX;
    state.y = state.nOriginY + e.clientY - state.pOriginY;
    node.style.left = state.x + 'px';
    node.style.top  = state.y + 'px';
  });

  const endDrag = () => {
    if (!state.dragging) return;
    state.dragging = false;
    state.vx = randVel();
    state.vy = randVel();
    node.style.cursor = '';
  };
  node.addEventListener('pointerup',     endDrag);
  node.addEventListener('pointercancel', endDrag);

  return state;
});

(function floatLoop() {
  const W = window.innerWidth, H = window.innerHeight;

  floatNodes.forEach(s => {
    if (s.dragging) return;

    const hw = s.node.offsetWidth  / 2;
    const hh = s.node.offsetHeight / 2;

    // Mouse attraction within 120px
    const dx = mouseX - s.x, dy = mouseY - s.y;
    const dist = Math.sqrt(dx * dx + dy * dy);
    if (dist < 120 && dist > 0) {
      s.vx += dx / dist * 0.008;
      s.vy += dy / dist * 0.008;
    }

    // Clamp velocity so it stays slow and drifty
    const speed = Math.sqrt(s.vx * s.vx + s.vy * s.vy);
    if (speed > 0.05) { s.vx = s.vx / speed * 0.05; s.vy = s.vy / speed * 0.05; }

    s.x += s.vx;
    s.y += s.vy;

    // Repel from starburst center
    const sr = starburst.getBoundingClientRect();
    const scx = sr.left + sr.width / 2, scy = sr.top + sr.height / 2;
    const sdx = s.x - scx, sdy = s.y - scy;
    const sdist = Math.sqrt(sdx * sdx + sdy * sdy);
    const exclusion = 120;
    if (sdist < exclusion && sdist > 0) {
      const push = (exclusion - sdist) / exclusion * 0.15;
      s.vx += sdx / sdist * push;
      s.vy += sdy / sdist * push;
    }

    // Bounce off edges
    if (s.x - hw < 0)  { s.x = hw;  s.vx = Math.abs(s.vx); }
    if (s.x + hw > W)  { s.x = W - hw; s.vx = -Math.abs(s.vx); }
    if (s.y - hh < 0)  { s.y = hh;  s.vy = Math.abs(s.vy); }
    if (s.y + hh > H)  { s.y = H - hh; s.vy = -Math.abs(s.vy); }

    s.node.style.left = s.x + 'px';
    s.node.style.top  = s.y + 'px';
  });

  requestAnimationFrame(floatLoop);
})();
</script>

</body>
</html>
