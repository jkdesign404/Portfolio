<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jack Kelly</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400&display=swap" rel="stylesheet">
<style>
  @font-face {
    font-family: 'Glacier';
    src: url('Glacier-Regular.ttf') format('truetype');
    font-weight: normal;
    font-style: normal;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #EBEBEB;
    width: 100vw;
    height: 100vh;
    overflow: hidden;
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    grid-template-rows: 1fr 1fr 1fr;
    position: relative;
  }

  .triangle-widget {
    position: absolute;
    transform: translate(-50%, -50%);
    cursor: grab;
    user-select: none;
    touch-action: none;
    opacity: 0;
  }

.starburst {
    opacity: 0;
    grid-column: 2;
    grid-row: 2;
    place-self: center;
    cursor: grab;
    user-select: none;
    touch-action: none;
    z-index: 1;
  }

  .starburst.dragging { cursor: grabbing; }

  @keyframes spin {
    from { transform: rotate(0deg); }
    to   { transform: rotate(360deg); }
  }

  .starburst-shape {
    transform-box: fill-box;
    transform-origin: center;
    animation: spin 24s linear infinite;
  }

  /* ── Side menu ── */
  .side-menu {
    position: fixed;
    right: 32px;
    top: 50%;
    transform: translateY(-50%);
    width: 210px;
    border-top: 1px dashed #000;
    z-index: 10;
    opacity: 0;
    transition: opacity 800ms ease;
    font-family: 'Inter', sans-serif;
    font-weight: 300;
  }

  .side-menu-item {
    border-bottom: 1px dashed #000;
    cursor: pointer;
    user-select: none;
  }

  .side-menu-row {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 7px 4px;
  }

  .side-menu-symbol {
    flex-shrink: 0;
    display: flex;
    align-items: center;
  }

  .side-menu-label {
    flex: 1;
    font-size: 11px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: #000;
  }

  .side-menu-toggle {
    font-size: 14px;
    line-height: 1;
    color: #000;
    font-weight: 200;
    transition: transform 0.3s ease;
  }

  .side-menu-item.open .side-menu-toggle {
    transform: rotate(45deg);
  }

  .side-menu-content {
    overflow: hidden;
    height: 0;
    transition: height 0.35s cubic-bezier(0.25, 0.46, 0.45, 0.94);
  }

  .side-menu-content-inner {
    font-size: 10px;
    letter-spacing: 0.04em;
    color: #555;
    line-height: 1.7;
    padding: 4px 4px 10px;
  }

  /* ── Contact line overlay ── */
  .contact-overlay {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 5;
  }

  .contact-email-link {
    position: fixed;
    pointer-events: auto;
    font-family: 'Inter', sans-serif;
    font-weight: 300;
    font-size: 11px;
    letter-spacing: 0.06em;
    color: #000;
    text-decoration: none;
    opacity: 0;
    transition: opacity 0.5s ease;
  }

  .contact-email-link:hover { text-decoration: underline; }

</style>
</head>
<body>

  <div class="side-menu-item">

      <span class="side-menu-symbol">
        <svg width="14" height="14" viewBox="0 0 14 14"><circle cx="7" cy="7" r="6" fill="#ff5f1f"/></svg>

      <span class="side-menu-toggle">+</span>
    </div>
    <div class="side-menu-content"><div class="side-menu-content-inner">jack@jkdsgn.com</div></div>
  </div>

  <div class="side-menu-item">
    <div class="side-menu-row">
      <span class="side-menu-symbol">
        <svg width="14" height="14" viewBox="0 0 14 14"><circle cx="7" cy="7" r="5.5" fill="none" stroke="#ff5f1f" stroke-width="1.5"/></svg>
      </span>

      <span class="side-menu-toggle">+</span>

    <div class="side-menu-content"><div class="side-menu-content-inner">Designer, based in North Carolina.<br> <br> Experience in brand, web, and package design with a production background in proofing, printing, and vinyl installation.</div></div>
  </div>

  <div class="side-menu-item">
    <div class="side-menu-row">
      <span class="side-menu-symbol">
        <svg width="14" height="14" viewBox="0 0 14 14"><circle cx="7" cy="7" r="5.5" fill="none" stroke="#ff5f1f" stroke-width="1.5"/></svg>
      </span>
      <span class="side-menu-label">Projects</span>
      <span class="side-menu-toggle">+</span>
    </div>
    <div class="side-menu-content"><div class="side-menu-content-inner">Selected work, 2022–2024</div></div>
  </div>

</div>

<script>
// ── Side menu accordion ──
document.querySelectorAll('.side-menu-item').forEach(item => {
  item.addEventListener('click', () => {
    const content = item.querySelector('.side-menu-content');
    const inner   = item.querySelector('.side-menu-content-inner');
    const isOpen  = item.classList.contains('open');
    document.querySelectorAll('.side-menu-item').forEach(i => {
      i.classList.remove('open');
      i.querySelector('.side-menu-content').style.height = '0';
    });
    if (!isOpen) {
      item.classList.add('open');
      content.style.height = inner.offsetHeight + 'px';
    }
  });
});

// ── Contact node line ──
const contactOverlay = document.getElementById('contactOverlay');
const contactEmail   = document.getElementById('contactEmail');
let contactOpen = false;

function drawContactLine() {
  const node = document.getElementById('node-contact');
  const r = node.getBoundingClientRect();
  // Start: top-left of circle area
  const sx = r.left + r.width * 0.2;
  const sy = r.top  + r.height * 0.25;

  // 3-segment path: diagonal up-left, then diagonal up-left again, then horizontal left
  const seg1x = sx - 25,  seg1y = sy - 20;
  const seg2x = sx - 50,  seg2y = sy - 38;
  const ex    = sx - 110, ey    = seg2y;

  const ns = 'http://www.w3.org/2000/svg';
  contactOverlay.innerHTML = '';

  [[sx, sy, seg1x, seg1y], [seg1x, seg1y, seg2x, seg2y], [seg2x, seg2y, ex, ey]].forEach(([x1,y1,x2,y2]) => {
    const line = document.createElementNS(ns, 'line');
    line.setAttribute('x1', x1); line.setAttribute('y1', y1);
    line.setAttribute('x2', x2); line.setAttribute('y2', y2);
    line.setAttribute('stroke', '#000');
    line.setAttribute('stroke-width', '1');
    line.setAttribute('stroke-linecap', 'round');
    contactOverlay.appendChild(line);
  });

  // Email sits above the horizontal segment
  contactEmail.style.left = (ex) + 'px';
  contactEmail.style.top  = (ey - 16) + 'px';
  contactEmail.style.opacity = '1';
}

function clearContactLine() {
  contactOverlay.innerHTML = '';
  contactEmail.style.opacity = '0';
}

document.getElementById('node-contact').addEventListener('click', () => {
  contactOpen = !contactOpen;
  contactOpen ? drawContactLine() : clearContactLine();
});

// ── Starburst rubber band drag ──
const starburst = document.querySelector('.starburst');
let dragging = false;
let originX = 0, originY = 0;
let curX = 0, curY = 0;

starburst.addEventListener('pointerdown', e => {
  dragging = true;
  originX = e.clientX - curX;
  originY = e.clientY - curY;
  starburst.style.transition = 'none';
  starburst.classList.add('dragging');
  starburst.setPointerCapture(e.pointerId);
});

starburst.addEventListener('pointermove', e => {
  if (!dragging) return;
  curX = e.clientX - originX;
  curY = e.clientY - originY;
  starburst.style.transform = `translate(${curX}px, ${curY}px)`;
});

function release() {
  if (!dragging) return;
  dragging = false;
  curX = 0;
  curY = 0;
  starburst.classList.remove('dragging');
  starburst.style.transition = 'transform 0.7s cubic-bezier(0.34, 1.56, 0.64, 1)';
  starburst.style.transform  = 'translate(0, 0)';
}

starburst.addEventListener('pointerup', release);
starburst.addEventListener('pointercancel', release);

// ── Intro fade-in sequence ──
function fadeIn(el, duration) {
  el.style.transition = `opacity ${duration}ms ease`;
  el.style.opacity = '1';
}

// Wave 1: starburst at 300ms
setTimeout(() => fadeIn(starburst, 1200), 300);

// Wave 2: circle nodes + side menu at 1400ms
const circleNodes = ['node-contact', 'node-about', 'node-projects'].map(id => document.getElementById(id));
circleNodes.forEach((el, i) => setTimeout(() => fadeIn(el, 1000), 1400 + i * 200));
setTimeout(() => { const m = document.getElementById('sideMenu'); m.style.transition = 'opacity 1000ms ease'; m.style.opacity = '1'; }, 1400);

// Wave 3: triangle nodes at 2800ms
const triangleNodes = ['node-branding', 'node-uiux', 'node-print'].map(id => document.getElementById(id));
triangleNodes.forEach((el, i) => setTimeout(() => fadeIn(el, 1000), 2800 + i * 200));

// ── Triangle node float + drag ──
const floatNodes = [...document.querySelectorAll('.triangle-widget')].map((node, i) => {
  const rect = node.getBoundingClientRect();
  const homeX = rect.left + rect.width  / 2;
  const homeY = rect.top  + rect.height / 2;
  node.style.left = homeX + 'px';
  node.style.top  = homeY + 'px';

  // Unique phase offsets per node so each drifts independently
  const state = {
    node, homeX, homeY,
    phaseX: Math.random() * Math.PI * 2,
    phaseY: Math.random() * Math.PI * 2,
    freqX:  0.00018 + Math.random() * 0.00008,
    freqY:  0.00015 + Math.random() * 0.00008,
    amp:    8 + Math.random() * 6,
    dragging: false, dragOffX: 0, dragOffY: 0, dragX: homeX, dragY: homeY
  };

  node.addEventListener('pointerdown', e => {
    state.dragging = true;
    state.dragOffX = e.clientX - state.dragX;
    state.dragOffY = e.clientY - state.dragY;
    node.style.cursor = 'grabbing';
    node.setPointerCapture(e.pointerId);
  });

  node.addEventListener('pointermove', e => {
    if (!state.dragging) return;
    state.dragX = e.clientX - state.dragOffX;
    state.dragY = e.clientY - state.dragOffY;
    node.style.left = state.dragX + 'px';
    node.style.top  = state.dragY + 'px';
  });

  const endDrag = () => {
    if (!state.dragging) return;
    state.dragging = false;
    node.style.cursor = '';
  };
  node.addEventListener('pointerup',     endDrag);
  node.addEventListener('pointercancel', endDrag);

  return state;
});

(function floatLoop(t) {
  floatNodes.forEach(s => {
    if (s.dragging) return;
    const x = s.homeX + Math.sin(t * s.freqX + s.phaseX) * s.amp;
    const y = s.homeY + Math.sin(t * s.freqY + s.phaseY) * s.amp;
    s.dragX = x; s.dragY = y;
    s.node.style.left = x + 'px';
    s.node.style.top  = y + 'px';
  });
  requestAnimationFrame(floatLoop);
})(performance.now());
</script>

</body>
