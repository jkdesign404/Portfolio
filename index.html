<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jack Kelly</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;300&display=swap" rel="stylesheet">
<style>
  @font-face {
    font-family: 'Glacier';
    src: url('Glacier-Regular.ttf') format('truetype');
    font-weight: normal;
    font-style: normal;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; cursor: none; }
  :root {
    --bg: #EAEAEA; --ink: #1a1a1a; --mid: #999; --blue: #0000ff; --orange: #f6632b;
    --glacier: 'Glacier', Georgia, serif;
    --inter: 'Inter', sans-serif;
  }
  body { background: var(--bg); width: 100vw; height: 100vh; overflow: hidden; font-family: var(--glacier); }

  .cursor {
    width: 8px; height: 8px; background: var(--ink); border-radius: 50%;
    position: fixed; pointer-events: none; z-index: 9999;
    transform: translate(-50%, -50%);
    transition: width .15s, height .15s, background .15s;
  }
  .cursor.hover { width: 24px; height: 24px; background: var(--blue); opacity: 0.3; }

  #layoutSVG { position: fixed; inset: 0; width: 100%; height: 100%; }

  .node-group { cursor: grab; }
  .node-group:active { cursor: grabbing; }
</style>
</head>
<body>

<div class="cursor" id="cursor"></div>

<svg id="layoutSVG" viewBox="-597 -485 2042 1779" preserveAspectRatio="xMidYMid meet"
  xmlns="http://www.w3.org/2000/svg"
  style="fill-rule:evenodd;clip-rule:evenodd;stroke-linecap:round;stroke-linejoin:round;">
  <g id="linesLayer"></g>
  <g id="labelsLayer"></g>
  <g id="nodesLayer"></g>
</svg>

<script>
const cursorEl = document.getElementById('cursor');
document.addEventListener('mousemove', e => {
  cursorEl.style.left = e.clientX + 'px';
  cursorEl.style.top  = e.clientY + 'px';
});

const NS  = 'http://www.w3.org/2000/svg';
const VB  = { x: -597, y: -485, w: 2042, h: 1779 };

function screenToSVG(px, py) {
  const svg  = document.getElementById('layoutSVG');
  const rect = svg.getBoundingClientRect();
  const scale = Math.min(rect.width / VB.w, rect.height / VB.h);
  const ox = (rect.width  - VB.w * scale) / 2;
  const oy = (rect.height - VB.h * scale) / 2;
  return {
    x: (px - rect.left - ox) / scale + VB.x,
    y: (py - rect.top  - oy) / scale + VB.y
  };
}

// ── Node definitions ───────────────────────────────────────────────────────
const nodes = {
  center:   { ox: 424, oy: 405, shape: 'starburst', dx:0, dy:0, vx:0, vy:0,
    labels: [
      { t: 'Jack Kelly', ox: -66, oy: 105, size: 36, fill: '#1a1a1a', font: 'Inter' },
      { t: 'est. 2004',  ox: -59, oy: 138, size: 28, fill: '#616161' }
    ]
  },
  contact:  { ox: 730, oy: 338, shape: 'triangle', dx:0, dy:0, vx:0, vy:0, labels: [{ t: 'Contact',  ox: -40, oy: -30, size: 26, fill: '#616161' }] },
  about:    { ox: 200, oy: 520, shape: 'triangle', dx:0, dy:0, vx:0, vy:0, labels: [{ t: 'About',    ox: -30, oy: -30, size: 26, fill: '#616161' }] },
  branding: { ox: 905, oy: 588, shape: 'diamond',  dx:0, dy:0, vx:0, vy:0, labels: [{ t: 'Branding', ox: -75, oy: -28, size: 26, fill: '#616161' }] },
  signage:  { ox: 363, oy: 779, shape: 'diamond',  dx:0, dy:0, vx:0, vy:0, labels: [{ t: 'Signage',  ox: -55, oy: -28, size: 26, fill: '#616161' }] },
  uiux:     { ox: 603, oy:  18, shape: 'diamond',  dx:0, dy:0, vx:0, vy:0, labels: [{ t: 'UI / UX',  ox: -40, oy:  50, size: 26, fill: '#616161' }] },
  print:    { ox:  35, oy: 270, shape: 'diamond',  dx:0, dy:0, vx:0, vy:0, labels: [{ t: 'Print',    ox: -28, oy: -28, size: 26, fill: '#616161' }] },
};

const edges = [
  ['center', 'contact'],
  ['center', 'about'],
  ['center', 'branding'],
  ['center', 'signage'],
  ['center', 'uiux'],
  ['center', 'print'],
];

// Bend points for organic lines (main edges only)
const bends = {
  'center-contact':  { tx: 0.6,  ty: 0.2  },
  'center-about':    { tx: 0.3,  ty: 0.7  },
  'center-branding': { tx: 0.75, ty: 0.55 },
  'center-signage':  { tx: 0.35, ty: 0.8  },
  'center-uiux':     { tx: 0.65, ty: 0.25 },
  'center-print':    { tx: 0.2,  ty: 0.4  },
};

const K = 0.10, DAMP = 0.68;

// ── Intro animation state ──────────────────────────────────────────────────
// Each edge animates its line from 0→1 progress, staggered
// After lines finish, nodes + labels fade in
const INTRO_DURATION   = 600;  // ms per line
const INTRO_STAGGER    = 80;   // ms between lines starting
const NODES_FADE_DELAY = 300;  // ms after last line starts before nodes appear
const NODES_FADE_DUR   = 500;

let introStart    = null;
let introComplete = false;
let nodesOpacity  = 0; // 0→1 during fade

// Per-edge intro progress (0→1)
const lineProgress = {};
edges.forEach(([a, b]) => { lineProgress[`${a}-${b}`] = 0; });

// ── Build nodes ────────────────────────────────────────────────────────────
function buildNodes() {
  const layer = document.getElementById('nodesLayer');
  layer.innerHTML = '';
  Object.entries(nodes).forEach(([id, n]) => {
    const g = document.createElementNS(NS, 'g');
    g.classList.add('node-group');
    g.setAttribute('data-id', id);
    g.style.opacity = '0'; // start invisible, fade in after lines

    const path = document.createElementNS(NS, 'path');
    if (n.shape === 'starburst') {
      path.setAttribute('d', 'M16,-47l32,23l-16,22l26,8l-12,37l-26,-8l0,27l-39,0l0,-27l-26,8l-12,-37l26,-8l-16,-22l32,-23l16,22l16,-22Z');
      path.setAttribute('fill', '#00f'); path.setAttribute('stroke', '#000'); path.setAttribute('stroke-width', '1.67');
      path.setAttribute('transform', 'scale(0.75)');
    } else if (n.shape === 'triangle') {
      path.setAttribute('d', 'M0,-22 L20,17 L-20,17 Z');
      path.setAttribute('fill', '#f6632b'); path.setAttribute('stroke', '#000'); path.setAttribute('stroke-width', '1.11');
    } else {
      path.setAttribute('d', 'M0,-17 L17,0 L0,17 L-17,0 Z');
      path.setAttribute('fill', '#00f'); path.setAttribute('stroke', '#000'); path.setAttribute('stroke-width', '1.11');
    }

    g.appendChild(path);
    g.addEventListener('mousedown', onMouseDown);
    g.addEventListener('mouseenter', () => cursorEl.classList.add('hover'));
    g.addEventListener('mouseleave',  () => cursorEl.classList.remove('hover'));
    layer.appendChild(g);
    n.el = g;
  });
}

// ── World position ─────────────────────────────────────────────────────────
function worldPos(id) {
  const n = nodes[id];
  return { x: n.ox + n.dx, y: n.oy + n.dy };
}

// ── Drag ───────────────────────────────────────────────────────────────────
let dragId = null, dragOrigin = null, dragStartDx = 0, dragStartDy = 0;

function onMouseDown(e) {
  if (!introComplete) return; // no drag during intro
  e.preventDefault();
  e.stopPropagation();
  dragId      = e.currentTarget.getAttribute('data-id');
  dragOrigin  = screenToSVG(e.clientX, e.clientY);
  dragStartDx = nodes[dragId].dx;
  dragStartDy = nodes[dragId].dy;
  nodes[dragId].vx = 0;
  nodes[dragId].vy = 0;
}

window.addEventListener('mousemove', e => {
  if (!dragId) return;
  const p = screenToSVG(e.clientX, e.clientY);
  nodes[dragId].dx = dragStartDx + (p.x - dragOrigin.x);
  nodes[dragId].dy = dragStartDy + (p.y - dragOrigin.y);
});

window.addEventListener('mouseup', () => { dragId = null; });

// ── Animation loop ─────────────────────────────────────────────────────────
function tick(ts) {
  if (!introStart) introStart = ts;
  const elapsed = ts - introStart;

  // Spring physics
  Object.entries(nodes).forEach(([id, n]) => {
    if (id === dragId) return;
    n.vx = (n.vx - K * n.dx) * DAMP;
    n.vy = (n.vy - K * n.dy) * DAMP;
    n.dx += n.vx;
    n.dy += n.vy;
    if (Math.abs(n.dx) < 0.05 && Math.abs(n.vx) < 0.05) { n.dx = 0; n.vx = 0; }
    if (Math.abs(n.dy) < 0.05 && Math.abs(n.vy) < 0.05) { n.dy = 0; n.vy = 0; }
  });

  // Update node positions
  Object.entries(nodes).forEach(([id, n]) => {
    const w = worldPos(id);
    n.el.setAttribute('transform', `translate(${w.x},${w.y})`);
    n._wx = w.x; n._wy = w.y;
  });

  // ── Intro: advance line progress ──
  let allLinesComplete = true;
  edges.forEach(([a, b], i) => {
    const key       = `${a}-${b}`;
    const lineStart = i * INTRO_STAGGER;
    const t         = Math.min(1, Math.max(0, (elapsed - lineStart) / INTRO_DURATION));
    // Ease out cubic
    lineProgress[key] = t < 1 ? 1 - Math.pow(1 - t, 3) : 1;
    if (lineProgress[key] < 1) allLinesComplete = false;
  });

  // ── Intro: fade in nodes after lines ──
  const nodesFadeStart = (edges.length - 1) * INTRO_STAGGER + INTRO_DURATION - NODES_FADE_DELAY;
  const nodesT = Math.min(1, Math.max(0, (elapsed - nodesFadeStart) / NODES_FADE_DUR));
  nodesOpacity = 1 - Math.pow(1 - nodesT, 2); // ease out

  if (nodesOpacity >= 1 && allLinesComplete) introComplete = true;

  // Apply node opacity
  Object.values(nodes).forEach(n => {
    n.el.style.opacity = nodesOpacity;
  });

  // ── Draw labels (fade with nodes) ──
  const ll2 = document.getElementById('labelsLayer');
  ll2.innerHTML = '';
  if (nodesOpacity > 0) {
    Object.values(nodes).forEach(n => {
      const cx = n._wx, cy = n._wy;
      (n.labels || []).forEach(lb => {
        const t = document.createElementNS(NS, 'text');
        t.setAttribute('x', cx + lb.ox);
        t.setAttribute('y', cy + lb.oy);
        const isName = lb.font === 'Inter';
        t.setAttribute('style',
          `font-family:${isName ? "'Inter',sans-serif" : "'Glacier',Georgia,serif"};` +
          `font-size:${lb.size}px;fill:${lb.fill};font-weight:${isName ? 300 : 'normal'};` +
          `opacity:${nodesOpacity};`
        );
        t.setAttribute('pointer-events', 'none');
        t.textContent = lb.t;
        ll2.appendChild(t);
      });
    });
  }

  // ── Draw lines (animated from center outward) ──
  const ll = document.getElementById('linesLayer');
  ll.innerHTML = '';

  edges.forEach(([a, b]) => {
    const key  = `${a}-${b}`;
    const prog = lineProgress[key];
    if (prog <= 0) return;

    const x1 = nodes[a]._wx, y1 = nodes[a]._wy;
    const x2 = nodes[b]._wx, y2 = nodes[b]._wy;
    const bend = bends[key];

    // Compute full path points
    let pts;
    if (bend) {
      const mx = x1 + (x2 - x1) * bend.tx;
      const my = y1 + (y2 - y1) * bend.ty;
      pts = [[x1, y1], [mx, my], [x2, y2]];
    } else {
      pts = [[x1, y1], [x2, y2]];
    }

    // Interpolate along the polyline up to prog
    const totalLen = pts.reduce((acc, pt, i) => {
      if (i === 0) return 0;
      const dx = pt[0] - pts[i-1][0], dy = pt[1] - pts[i-1][1];
      return acc + Math.sqrt(dx*dx + dy*dy);
    }, 0);

    const targetLen = totalLen * prog;
    let drawn = 0;
    let dStr = `M${pts[0][0]},${pts[0][1]}`;

    for (let i = 1; i < pts.length; i++) {
      const dx = pts[i][0] - pts[i-1][0];
      const dy = pts[i][1] - pts[i-1][1];
      const segLen = Math.sqrt(dx*dx + dy*dy);
      if (drawn + segLen <= targetLen) {
        dStr += ` L${pts[i][0]},${pts[i][1]}`;
        drawn += segLen;
      } else {
        const rem = targetLen - drawn;
        const frac = rem / segLen;
        dStr += ` L${pts[i-1][0] + dx*frac},${pts[i-1][1] + dy*frac}`;
        break;
      }
    }

    const path = document.createElementNS(NS, 'path');
    path.setAttribute('d', dStr);
    path.setAttribute('fill', 'none');
    path.setAttribute('stroke', '#888');
    path.setAttribute('stroke-width', '1');
    path.setAttribute('pointer-events', 'none');
    ll.appendChild(path);
  });

  requestAnimationFrame(tick);
}

// ── Init ───────────────────────────────────────────────────────────────────
buildNodes();

// Pre-init world positions
Object.keys(nodes).forEach(id => {
  const w = worldPos(id);
  nodes[id]._wx = w.x; nodes[id]._wy = w.y;
});

requestAnimationFrame(tick);
</script>
</body>
</html>
